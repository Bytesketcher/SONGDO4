<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>힘찬이의 송도탐험 게임 — 송도4동마을도슨트 교육자료</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#e8f5ee;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:16px}
#app{width:760px;max-width:100%;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.14)}

/* HUD */
#hud{display:flex;align-items:center;padding:8px 16px;background:#1D9E75;gap:10px;flex-wrap:wrap}
.hud-player{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.18);border-radius:20px;padding:3px 10px 3px 4px}
.hud-avatar{width:34px;height:34px;border-radius:50%;background:white;overflow:hidden;border:2px solid rgba(255,255,255,.7);flex-shrink:0}
.hud-pname{font-size:13px;font-weight:700;color:#fff}
.hud-psub{font-size:10px;color:rgba(255,255,255,.75)}
.stamp-bar{display:flex;gap:4px;align-items:center;flex-wrap:wrap;flex:1;justify-content:center}
.stamp-slot{width:24px;height:24px;border-radius:50%;border:2px dashed rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .3s;opacity:.4}
.stamp-slot.filled{border-style:solid;border-color:#fff;background:rgba(255,255,255,.25);opacity:1;transform:scale(1.1)}
#score-badge{background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;white-space:nowrap}

/* Legend */
.legend-bar{display:flex;gap:10px;padding:6px 16px;background:#f5fdf5;border-bottom:1px solid #c0e4c0;flex-wrap:wrap;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#444}
.leg-dot{width:9px;height:9px;border-radius:50%}

/* Map */
#map-wrap{position:relative;width:100%;height:460px;overflow:hidden;background:#8ecae6;cursor:default}
.map-loc{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;transform:translate(-50%,-50%);z-index:3;transition:transform .15s}
.map-loc:hover{transform:translate(-50%,-50%) scale(1.13)}
.loc-bubble{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2.5px solid rgba(255,255,255,.85);box-shadow:0 2px 8px rgba(0,0,0,.15);position:relative;transition:box-shadow .2s}
.map-loc:hover .loc-bubble{box-shadow:0 4px 16px rgba(0,0,0,.25)}
.check-badge{position:absolute;top:-4px;right:-4px;background:#1D9E75;color:#fff;font-size:9px;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;font-weight:700}
.loc-label{font-size:9px;font-weight:700;color:#1a3a1a;background:rgba(255,255,255,.9);padding:2px 6px;border-radius:10px;margin-top:3px;white-space:nowrap;border:1px solid rgba(0,100,0,.1);max-width:80px;text-align:center;line-height:1.3}
.cat-school .loc-bubble{background:#B5D4F4}
.cat-park .loc-bubble{background:#9FE1CB}
.cat-culture .loc-bubble{background:#FAC775}
.cat-community .loc-bubble{background:#CED4F8}
.cat-transport .loc-bubble{background:#F4C0D1}
.cat-festival .loc-bubble{background:#F9D4A0}

/* 힘찬이 on map */
#himchan-map{position:absolute;z-index:5;cursor:pointer;transform:translate(-50%,-50%);transition:transform .2s;filter:drop-shadow(0 3px 6px rgba(0,0,0,.2))}
#himchan-map:hover{transform:translate(-50%,-50%) scale(1.1)}
.himchan-label{font-size:10px;font-weight:700;color:#1a3a1a;background:rgba(255,255,255,.9);padding:2px 8px;border-radius:10px;text-align:center;border:1px solid #5DCAA5;white-space:nowrap}

/* Wildlife */
.wildlife{position:absolute;font-size:28px;cursor:pointer;z-index:4;transition:transform .15s;user-select:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.18))}
.wildlife:hover{transform:scale(1.3)}
@keyframes float1{0%,100%{transform:translate(0,0)} 33%{transform:translate(22px,-12px)} 66%{transform:translate(44px,8px)}}
@keyframes float2{0%,100%{transform:translate(0,0)} 40%{transform:translate(-18px,16px)} 70%{transform:translate(12px,-10px)}}
@keyframes float3{0%,100%{transform:translate(0,0)} 30%{transform:translate(16px,20px)} 65%{transform:translate(-22px,8px)}}
.w1{animation:float1 13s ease-in-out infinite}
.w2{animation:float2 17s ease-in-out infinite}
.w3{animation:float3 21s ease-in-out infinite}

/* Panel */
#panel{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #1D9E75;padding:12px 16px 10px;z-index:10;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
#panel.open{transform:translateY(0)}
.panel-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:6px}
.panel-left{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.docent-avatar{width:44px;height:44px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid #5DCAA5}
.docent-name{font-size:10px;color:#0F6E56;font-weight:700;text-align:center;max-width:50px;line-height:1.3}
.docent-role{font-size:9px;color:#5DCAA5;text-align:center}
.himchan-panel{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid #4a90d9;background:#f0f8ff;flex-shrink:0}
.panel-bubble-wrap{flex:1;display:flex;flex-direction:column;gap:4px}
.himchan-bubble{background:#e8f4ff;border-radius:12px 12px 12px 0;padding:5px 10px;font-size:11.5px;color:#1a3a6a;border:1px solid #b5d4f4;line-height:1.5}
.speech{background:#f7fdf7;border-radius:0 12px 12px 12px;padding:8px 11px;font-size:12px;line-height:1.65;color:#222;border:1px solid #c8e8c8}
.loc-info-tag{font-size:11px;color:#666;margin-bottom:6px;padding-left:4px}
.panel-btns{display:flex;gap:8px;justify-content:flex-end}
.btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .15s}
.btn-quiz{background:#E1F5EE;color:#0F6E56;border-color:#5DCAA5}
.btn-quiz:hover{background:#9FE1CB}
.btn-quiz:disabled{opacity:.5;cursor:default}
.btn-close{background:transparent;color:#888;border-color:#ccc}
.btn-close:hover{background:#f5f5f5}

/* Quiz */
#quiz-wrap{position:absolute;inset:0;background:rgba(0,0,0,.52);display:none;align-items:center;justify-content:center;z-index:20}
#quiz-box{background:#fff;border-radius:14px;padding:20px;max-width:400px;width:92%;box-shadow:0 8px 32px rgba(0,0,0,.22)}
.quiz-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.quiz-hc{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid #4a90d9;flex-shrink:0;background:#f0f8ff}
.quiz-loc{font-size:11px;color:#1D9E75;font-weight:700}
.quiz-q{font-size:14px;font-weight:600;color:#1a2a1a;margin-bottom:12px;line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.qopt{padding:9px 14px;border-radius:8px;border:1.5px solid #ddd;font-size:13px;cursor:pointer;text-align:left;background:#fff;color:#333;transition:all .15s;font-family:inherit}
.qopt:hover:not(:disabled){background:#f0faf0;border-color:#5DCAA5}
.qopt.correct{background:#E1F5EE;border-color:#1D9E75;color:#085041;font-weight:600}
.qopt.wrong{background:#FCEBEB;border-color:#F09595;color:#501313}
.quiz-res{margin-top:10px;font-size:13px;line-height:1.6;display:none;padding:9px 12px;border-radius:8px}
.quiz-res.ok{background:#E1F5EE;color:#085041}
.quiz-res.fail{background:#FCEBEB;color:#501313}
.quiz-next{margin-top:10px;width:100%;padding:10px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:none;font-family:inherit}
.quiz-next:hover{background:#0F6E56}

/* Wildlife popup */
#wl-popup{position:absolute;background:#fff;border-radius:12px;padding:11px 13px;max-width:220px;font-size:12px;line-height:1.6;color:#333;box-shadow:0 4px 20px rgba(0,0,0,.18);z-index:30;display:none;border:1.5px solid #9FE1CB;pointer-events:none}
#wl-popup .wl-name{font-size:13px;font-weight:700;color:#0F6E56;margin-bottom:3px}

/* Intro banner */
#intro-banner{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.96);border-radius:14px;padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:15;border:1.5px solid #5DCAA5;max-width:360px;animation:slideDown .5s ease-out}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#intro-banner .ib-hc{width:52px;height:60px;flex-shrink:0}
.ib-text{font-size:12px;line-height:1.7;color:#1a3a1a}
.ib-text strong{color:#0F6E56;font-size:13px}
.ib-close{position:absolute;top:6px;right:8px;background:none;border:none;font-size:14px;cursor:pointer;color:#888;line-height:1}

/* Complete */
#complete{position:absolute;inset:0;background:rgba(255,255,255,.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:40;padding:20px;text-align:center}
.c-hc{width:90px;height:105px;margin-bottom:8px}
.c-title{font-size:21px;font-weight:700;color:#0F6E56;margin-bottom:6px}
.c-sub{font-size:13px;color:#444;line-height:1.9;margin-bottom:14px}
.c-stamps{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;max-width:420px}
.c-stamp{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:#E1F5EE;border:2px solid #5DCAA5}
.restart-btn{background:#1D9E75;color:#fff;border:none;padding:10px 26px;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.restart-btn:hover{background:#0F6E56}
</style>
</head>
<body>
<div id="app">

  <!-- HUD -->
  <div id="hud">
    <div class="hud-player">
      <div class="hud-avatar" id="hud-avatar-wrap"></div>
      <div>
        <div class="hud-pname">힘찬이</div>
        <div class="hud-psub">마을 탐험가</div>
      </div>
    </div>
    <div class="stamp-bar" id="stamp-bar"></div>
    <div id="score-badge">탐험 <span id="score-n">0</span>/13</div>
  </div>

  <!-- Legend -->
  <div class="legend-bar">
    <div class="leg-item"><div class="leg-dot" style="background:#378ADD"></div>학교</div>
    <div class="leg-item"><div class="leg-dot" style="background:#1D9E75"></div>공원</div>
    <div class="leg-item"><div class="leg-dot" style="background:#EF9F27"></div>문화</div>
    <div class="leg-item"><div class="leg-dot" style="background:#7F77DD"></div>행정</div>
    <div class="leg-item"><div class="leg-dot" style="background:#D4537E"></div>교통</div>
    <div class="leg-item"><div class="leg-dot" style="background:#D85A30"></div>축제</div>
    <div class="leg-item" style="margin-left:6px;color:#0F6E56;font-weight:600;font-size:11px">저어새·너구리·까마귀 클릭!</div>
  </div>

  <!-- Map -->
  <div id="map-wrap">

    <!-- 실제 지도 배경 SVG -->
    <svg id="map-svg" viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg"
         style="position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none">

      <!-- 실제 지도 배경 이미지 (JS에서 주입) -->
      <image id="map-bg-img" x="0" y="-86" width="760" height="632" preserveAspectRatio="xMidYMid meet"/>


      <!-- 방위표 (우상단) -->
      <g transform="translate(718,32)">
        <circle r="24" fill="rgba(255,255,255,.9)" stroke="#3a9960" stroke-width="1.8"/>
        <line x1="0" y1="-18" x2="0" y2="18" stroke="#bbb" stroke-width="0.8"/>
        <line x1="-18" y1="0" x2="18" y2="0" stroke="#bbb" stroke-width="0.8"/>
        <polygon points="0,-17 -5,-6 0,-10 5,-6" fill="#cc2222"/>
        <polygon points="0,17 -5,6 0,10 5,6" fill="#999"/>
        <text x="0" y="-19" font-size="11" fill="#cc2222" font-family="sans-serif" font-weight="700" text-anchor="middle">N</text>
        <text x="0" y="30" font-size="9" fill="#888" font-family="sans-serif" text-anchor="middle">S</text>
        <text x="22" y="4" font-size="9" fill="#888" font-family="sans-serif">E</text>
        <text x="-22" y="4" font-size="9" fill="#888" font-family="sans-serif" text-anchor="end">W</text>
      </g>

      <!-- 축척 -->
      <g transform="translate(624,447)">
        <rect x="-4" y="-16" width="112" height="18" fill="rgba(255,255,255,.8)" rx="4"/>
        <line x1="0" y1="0" x2="96" y2="0" stroke="#333" stroke-width="1.8"/>
        <line x1="0" y1="-5" x2="0" y2="5" stroke="#333" stroke-width="1.8"/>
        <line x1="48" y1="-3" x2="48" y2="3" stroke="#333" stroke-width="1.2"/>
        <line x1="96" y1="-5" x2="96" y2="5" stroke="#333" stroke-width="1.8"/>
        <text x="48" y="-7" font-size="9" fill="#333" font-family="'Malgun Gothic',sans-serif" text-anchor="middle">약 1 km</text>
      </g>
    </svg>

    <!-- 장소 -->
    <div id="locs"></div>

   

    <!-- 힘찬이 캐릭터 on map -->
    <div id="himchan-map" style="left:49%;top:54%" onclick="showHimchanIntro()">
      <div id="himchan-map-svg"></div>
      <div class="himchan-label">힘찬이</div>
    </div>

    <!-- 야생동물 -->
    <div class="wildlife w1" style="left:6%;top:75%;font-size:0;width:46px;height:52px" id="wl-spoonbill"
         onclick="showWildlife(event,'저어새','','저어새는 인천 갯벌의 터줏대감이에요! 멸종위기 1급 조류로, 납작한 주걱 모양 부리를 좌우로 흔들며 물고기를 잡아요. 전 세계 저어새의 절반 이상이 인천에서 번식한답니다.')">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 54" width="46" height="52" style="display:block;pointer-events:none">
        <line x1="19" y1="44" x2="16" y2="53" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="22" y1="44" x2="25" y2="53" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="16" y1="53" x2="12" y2="55" stroke="#111" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="16" y1="53" x2="20" y2="55" stroke="#111" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="25" y1="53" x2="21" y2="55" stroke="#111" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="25" y1="53" x2="29" y2="55" stroke="#111" stroke-width="1.4" stroke-linecap="round"/>
        <ellipse cx="21" cy="36" rx="13" ry="9" fill="white" stroke="#ccc" stroke-width="0.8"/>
        <ellipse cx="10" cy="38" rx="6" ry="3.5" fill="white" stroke="#ccc" stroke-width="0.8" transform="rotate(-20,10,38)"/>
        <path d="M24,28 C28,22 22,16 25,10" fill="none" stroke="#ccc" stroke-width="8" stroke-linecap="round"/>
        <path d="M24,28 C28,22 22,16 25,10" fill="none" stroke="white" stroke-width="6.5" stroke-linecap="round"/>
        <ellipse cx="26" cy="30" rx="5" ry="3" fill="#f5c47a" opacity="0.7"/>
        <ellipse cx="26" cy="9" rx="6" ry="5.5" fill="white" stroke="#ccc" stroke-width="0.8"/>
        <ellipse cx="28" cy="10" rx="5" ry="3.5" fill="#1a1a1a"/>
        <circle cx="29" cy="9" r="2" fill="#1a1a1a"/>
        <circle cx="29" cy="9" r="1.2" fill="#f0c040"/>
        <circle cx="29" cy="9" r="0.6" fill="#1a1a1a"/>
        <path d="M30,11 C33,9 38,8.5 42,9 C42,10 42,11.5 42,12 C38,11.5 33,12 30,13 Z" fill="#1a1a1a"/>
        <ellipse cx="42.5" cy="10.5" rx="2.5" ry="2" fill="#1a1a1a"/>
      </svg>
    </div>
    <div class="wildlife w2" style="left:36%;top:64%" id="wl-raccoon"
         onclick="showWildlife(event,'너구리','🦝','너구리는 송도 공원의 밤 탐험가예요! 낮에는 숨어 자고 밤에 활동해요. 눈 주위 검은 무늬가 마스크 같죠? 잡식성이라 뭐든 잘 먹고, 겨울엔 반쯤 겨울잠을 잔답니다.')">🦝</div>
    <div class="wildlife w3" style="left:75%;top:54%" id="wl-crow"
         onclick="showWildlife(event,'큰부리까마귀','🐦‍⬛','큰부리까마귀는 송도에서 가장 영리한 새예요! 도구를 사용하고 사람 얼굴도 기억해요. 까악까악 울음소리가 크지만, 해충을 잡아먹는 마을의 수호자랍니다.')">🐦‍⬛</div>

    <!-- 힘찬이 인트로 배너 -->
    <div id="intro-banner">
      <div class="ib-hc" id="intro-hc-svg"></div>
      <div class="ib-text">
        <strong>안녕! 나는 힘찬이야 🔍</strong><br>
        송도4동 마을도슨트 선생님들께<br>
        우리 마을 이야기를 들으러 가자!<br>
        <span style="color:#888;font-size:11px">장소를 클릭해 탐험을 시작하세요</span>
      </div>
      <button class="ib-close" onclick="document.getElementById('intro-banner').style.display='none'">✕</button>
    </div>

    <!-- 좌하단 크레딧 -->
    <div style="position:absolute;left:10px;bottom:12px;z-index:5;background:rgba(255,255,255,.85);border-radius:8px;padding:4px 10px;border:1px solid rgba(29,158,117,.35)">
      <span style="font-size:11px;font-weight:700;color:#0F6E56">송도4동마을도슨트</span>
    </div>

    <!-- 패널 -->
    <div id="panel">
      <div class="panel-top">
        <div class="panel-left">
          <div class="docent-avatar" id="p-avatar">🧑‍🏫</div>
          <div class="docent-name" id="p-name">도슨트</div>
          <div class="docent-role">마을 도슨트</div>
        </div>
        <div class="panel-bubble-wrap">
          <div class="himchan-bubble" id="p-himchan-q">선생님, 이 곳에 대해 알려주세요!</div>
          <div class="speech" id="p-story">지도의 장소를 클릭해 탐험을 시작하세요.</div>
        </div>
        <div class="himchan-panel" id="panel-hc-svg"></div>
      </div>
      <div class="loc-info-tag" id="p-info"></div>
      <div class="panel-btns">
        <button class="btn btn-close" onclick="closePanel()">닫기</button>
        <button class="btn btn-quiz" id="quiz-btn" onclick="openQuiz()">퀴즈 도전! 🎯</button>
      </div>
    </div>

    <!-- 야생동물 팝업 -->
    <div id="wl-popup"><div class="wl-name" id="wl-pname"></div><div id="wl-ptext"></div></div>

    <!-- 퀴즈 -->
    <div id="quiz-wrap">
      <div id="quiz-box">
        <div class="quiz-header">
          <div class="quiz-hc" id="quiz-hc-svg"></div>
          <div class="quiz-loc" id="quiz-loc-name"></div>
        </div>
        <div class="quiz-q" id="quiz-q"></div>
        <div class="quiz-opts" id="quiz-opts"></div>
        <div class="quiz-res" id="quiz-res"></div>
        <button class="quiz-next" id="quiz-next" onclick="closeQuiz()">스탬프 획득! 계속 탐험하기 →</button>
      </div>
    </div>

    <!-- 완료 -->
    <div id="complete">
      <div class="c-hc" id="complete-hc-svg"></div>
      <div class="c-title">🏅 송도 마을 탐험 완료!</div>
      <div class="c-sub">

    d.style.left=loc.x+'%';
    d.style.top=loc.y+'%';
    d.onclick=()=>openPanel(loc);
    const check=visited[loc.id]?'<div class="check-badge">✓</div>':'';
    const label=loc.name.replace('\n','<br>');
    d.innerHTML='<div class="loc-bubble cat-'+loc.cat+'">'+loc.icon+check+'</div><div class="loc-label">'+label+'</div>';
    el.appendChild(d);
  });
}

function openPanel(loc){
  currentLoc=loc;
  document.getElementById('p-avatar').textContent=loc.avatar;
  document.getElementById('p-name').textContent=loc.docent;
  document.getElementById('p-himchan-q').textContent=loc.himchanQ||'선생님, 이 곳에 대해 알려주세요!';
  document.getElementById('p-story').textContent=loc.story;
  document.getElementById('p-info').textContent=loc.info;
  const qb=document.getElementById('quiz-btn');
  if(visited[loc.id]){qb.disabled=true;qb.textContent='✓ 완료';}
  else{qb.disabled=false;qb.textContent='퀴즈 도전! 🎯';}
  document.getElementById('panel').classList.add('open');
}

function showWildlife(e,name,emoji,desc){
  e.stopPropagation();
  const p=document.getElementById('wl-popup');
  document.getElementById('wl-pname').textContent=(emoji?emoji+' ':'')+name;
  document.getElementById('wl-ptext').textContent=desc;
  const rect=document.getElementById('map-wrap').getBoundingClientRect();
  let lx=e.clientX-rect.left+12, ly=e.clientY-rect.top-20;
  if(lx+224>rect.width)lx=e.clientX-rect.left-236;
  if(ly+130>rect.height)ly=e.clientY-rect.top-140;
  p.style.left=lx+'px';p.style.top=ly+'px';p.style.display='block';
}
function closePanel(){document.getElementById('panel').classList.remove('open');}

function openQuiz(){
  if(!currentLoc||visited[currentLoc.id])return;
  const q=currentLoc.quiz;
  document.getElementById('quiz-loc-name').textContent='📍 '+currentLoc.name.replace('\n','');
  document.getElementById('quiz-q').textContent=q.q;
  const opts=document.getElementById('quiz-opts');
  opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='qopt';
    b.textContent=o;
    b.onclick=()=>answer(i,q.ans,currentLoc);
    opts.appendChild(b);
  });
  document.getElementById('quiz-res').style.display='none';
  document.getElementById('quiz-res').className='quiz-res';
  document.getElementById('quiz-next').style.display='none';
  document.getElementById('quiz-wrap').style.display='flex';
}

function answer(chosen,correct,loc){
  document.querySelectorAll('.qopt').forEach((b,i)=>{
    b.disabled=true;
    if(i===correct)b.classList.add('correct');
    else if(i===chosen)b.classList.add('wrong');
  });
  const res=document.getElementById('quiz-res');
  res.style.display='block';
  if(chosen===correct){
    res.className='quiz-res ok';
    res.textContent='정답이에요! 🎉 힘찬이가 '+loc.name.replace('\n','')+' 스탬프를 획득했어요!';
    markVisited(loc);
    document.getElementById('quiz-next').style.display='block';
  } else {
    res.className='quiz-res fail';
    res.textContent='아쉬워요! 정답은 "'+loc.quiz.opts[correct]+'"이에요. 힘찬이, 다시 도전해봐요!';
    setTimeout(()=>{document.getElementById('quiz-wrap').style.display='none';},2500);
  }
}

function markVisited(loc){
  if(visited[loc.id])return;
  visited[loc.id]=true;
  score++;
  document.getElementById('score-n').textContent=score;
  const s=document.getElementById('ss-'+loc.id);
  if(s)s.classList.add('filled');
  renderLocs();
  if(score>=LOCS.length)setTimeout(showComplete,800);
}

function closeQuiz(){
  document.getElementById('quiz-wrap').style.display='none';
  const qb=document.getElementById('quiz-btn');
  if(qb){qb.disabled=true;qb.textContent='✓ 완료';}
}

function resetGame(){
  visited={};score=0;currentLoc=null;
  document.getElementById('score-n').textContent='0';
  document.getElementById('complete').style.display='none';
  document.getElementById('panel').classList.remove('open');
  document.getElementById('quiz-wrap').style.display='none';
  document.getElementById('intro-banner').style.display='flex';
  initStamps();renderLocs();
}

injectHimchan();
initStamps();
renderLocs();
</script>
</body>
</html>
